version: '3.9'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: seniorcare
      POSTGRES_PASSWORD: seniorcare_pass
      POSTGRES_DB: seniorcare360
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seniorcare -d seniorcare360"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://seniorcare:seniorcare_pass@db:5432/seniorcare360
      SECRET_KEY: seniorcare360-dev-secret-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      ENVIRONMENT: development
      CORS_ORIGINS: http://localhost:19006,http://localhost:8081,http://localhost:8000
      SHOW_API_DOCS: "true"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python -c 'from app.core.database import engine, Base; from app.models.user import User, Medication, Delivery, Vital, Appointment, EmergencyContact, FamilyMember; Base.metadata.create_all(bind=engine); print(\"✅ DB tables created\")' &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:
